        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let timerInterval;
        let timeLeft = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startExam() {
            const timerInput = document.getElementById('timer-input').value;
            const qCountType = document.querySelector('input[name="q-count"]:checked').value;
            
            timeLeft = parseInt(timerInput) * 60;
            
            let pool = [...questionBank];
            shuffle(pool);
            
            if (qCountType === "200") {
                currentQuestions = pool.slice(0, 200);
            } else {
                currentQuestions = pool;
            }

            currentIndex = 0;
            userAnswers = [];
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            
            startTimer();
            showQuestion();
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    endExam();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (timeLeft < 60) {
                document.getElementById('timer-display').classList.add('text-red-600');
            }
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('progress-text').innerText = `Soalan ${currentIndex + 1} / ${currentQuestions.length}`;
            
            const progress = ((currentIndex) / currentQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function handleAnswer(answer) {
            userAnswers.push({
                questionId: currentQuestions[currentIndex].id,
                text: currentQuestions[currentIndex].text,
                userAnswer: answer,
                correctAnswer: currentQuestions[currentIndex].correct,
                isCorrect: answer === currentQuestions[currentIndex].correct
            });

            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                endExam();
            }
        }

        function endExam() {
            clearInterval(timerInterval);
            document.getElementById('exam-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const correctCount = userAnswers.filter(a => a.isCorrect).length;
            const wrongCount = userAnswers.length - correctCount;

            document.getElementById('final-score').innerText = `${correctCount}/${userAnswers.length}`;
            document.getElementById('total-correct').innerText = correctCount;
            document.getElementById('total-wrong').innerText = wrongCount;

            const tableBody = document.getElementById('results-table-body');
            tableBody.innerHTML = '';

            userAnswers.forEach(ans => {
                const row = document.createElement('tr');
                if (ans.userAnswer === "Setuju") {
                    row.className = "bg-red-50";
                }
                
                row.innerHTML = `
                    <td class="p-4 border-b text-sm font-mono">${ans.questionId}</td>
                    <td class="p-4 border-b text-sm">${ans.text}</td>
                    <td class="p-4 border-b text-sm font-bold ${ans.isCorrect ? 'text-green-600' : 'text-red-600'}">
                        ${ans.isCorrect ? 'BETUL' : 'SALAH'}
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }
